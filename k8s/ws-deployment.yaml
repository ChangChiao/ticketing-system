apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-ws
  labels:
    app: ticketing-ws
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-ws
  template:
    metadata:
      labels:
        app: ticketing-ws
    spec:
      containers:
        - name: ws
          image: ticketing-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_ADDR
              value: redis-cluster:6379
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-ws
spec:
  selector:
    app: ticketing-ws
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ticketing-ws-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ticketing-ws
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
