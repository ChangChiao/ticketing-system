apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-api
  labels:
    app: ticketing-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ticketing-api
  template:
    metadata:
      labels:
        app: ticketing-api
    spec:
      initContainers:
        - name: migrate
          image: ticketing-api:latest
          command: ["/migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: database-url
            - name: MIGRATIONS_DIR
              value: /migrations
      containers:
        - name: api
          image: ticketing-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: database-url
            - name: REDIS_ADDR
              value: redis-cluster:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: jwt-secret
            - name: LINEPAY_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: linepay-channel-id
            - name: LINEPAY_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: linepay-channel-secret
            - name: LINEPAY_BASE_URL
              value: https://sandbox-api-pay.line.me
            - name: APP_BASE_URL
              value: https://tickets.example.com
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: turnstile-secret-key
            - name: REQUEST_SIGN_SECRET
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: request-sign-secret
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/events
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/events
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-api
spec:
  selector:
    app: ticketing-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ticketing-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ticketing-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
