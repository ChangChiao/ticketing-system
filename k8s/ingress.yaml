apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "ticketing-ws"
spec:
  rules:
    - host: tickets.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ticketing-api
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ticketing-ws
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticketing-frontend
                port:
                  number: 3000
